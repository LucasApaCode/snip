<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Top handle ring -->
  <circle cx="7.5" cy="9" r="5" stroke="#863bff" stroke-width="3"/>
  <!-- Bottom handle ring -->
  <circle cx="7.5" cy="23" r="5" stroke="#863bff" stroke-width="3"/>
  <!-- Top blade: from top ring → pivot → tip bottom-right -->
  <polyline points="11.5,11.5 16,16 29,22" stroke="#863bff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom blade: from bottom ring → pivot → tip top-right -->
  <polyline points="11.5,20.5 16,16 29,10" stroke="#863bff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pivot screw -->
  <circle cx="16" cy="16" r="2.5" fill="#863bff"/>
</svg>
